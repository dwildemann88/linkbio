<html lang="pt-BR">

    Linkbio PROJEM Engenharia Elétrica
    Projeto estático em HTML + CSS + JavaScript puro.

    Ajuste desta versão:
    - foco em mobile;
    - balões amarelos mais limpos, sem efeitos decorativos;
    - ícones pretos à esquerda, sem borda e sem caixa;
    - descrições curtas para leitura rápida;
    - mais espaçamento vertical entre os balões;
    - logo com borda amarela no topo.
  -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />

  <title>PROJEM Engenharia Elétrica | Links</title>
  <meta name="description" content="Linkbio oficial da PROJEM Engenharia Elétrica: WhatsApp técnico, site oficial e portfólio de projetos." />

  <!-- Fonte Poppins. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Favicon com o símbolo da PROJEM. -->

  <!-- Estilos principais. -->
  <link rel="stylesheet" href="styles.css" />
